name: build-image
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # weights baked in -> ~57GB image; aggressively free runner disk first
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
                      /usr/local/lib/node_modules /usr/local/.ghcup || true
          sudo docker image prune -af || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        env:
          # the image push succeeds; it was the post-step "buildx history export" (build summary /
          # record archive) that ran the runner out of disk. skip it — it's cosmetic.
          DOCKER_BUILD_SUMMARY: "false"
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-ugc-ltx-serverless:latest
          provenance: false
